---
- name: Configure training-project server
  hosts: devservers
  become: true

  vars:
    app_user: training
    app_home: /home/training
    app_dir: /opt/training-app
    app_repo: "https://github.com/Alrum0/training-project.git"

  tasks:
    - name: Create application user
      ansible.builtin.user:
        name: "{{ app_user }}"
        shell: /bin/bash
        create_home: true
        home: "{{ app_home }}"
        groups: []
        state: present

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - git
          - python3
          - python3-pip
          - python3-venv
        state: present
        update_cache: true

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present
        update_cache: true

    - name: Ensure Docker service is enabled and running
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Add training user to docker group
      ansible.builtin.user:
        name: "{{ app_user }}"
        groups: docker
        append: true

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Create application config directory
      ansible.builtin.file:
        path: "{{ app_home }}/.config"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0700"

    - name: Clone training-project repository
      ansible.builtin.git:
        repo: "{{ app_repo }}"
        dest: "{{ app_dir }}"
        version: main
      become_user: "{{ app_user }}"

    - name: Create application environment file
      ansible.builtin.copy:
        content: |
          PORT=5000
          POSTGRES_PASSWORD={{ db_password }}
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"
      notify:
        - Restart training-app

    - name: Install Python dependencies
      ansible.builtin.pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"
        virtualenv_command: /usr/bin/python3 -m venv
      become_user: "{{ app_user }}"

    - name: Copy systemd unit file
      ansible.builtin.copy:
        src: training-app.service
        dest: /etc/systemd/system/training-app.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart training-app

    - name: Enable training-app service
      ansible.builtin.systemd:
        name: training-app
        enabled: true

    - name: Ensure training-app service is running
      ansible.builtin.systemd:
        name: training-app
        state: started

    - name: Start PostgreSQL container
      ansible.builtin.command: docker compose up -d
      args:
        chdir: "{{ app_dir }}"

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart training-app
      ansible.builtin.systemd:
        name: training-app
        state: restarted
