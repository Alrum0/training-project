---
- name: Configure training-project server
  hosts: devservers
  become: true

  vars:
    app_user: training
    app_home: /home/training
    app_dir: /opt/training-app
    app_repo: "https://github.com/Alrum0/training-project.git"

  tasks:
    - name: Create application user
      ansible.builtin.user:
        name: "{{ app_user }}"
        shell: /bin/bash
        create_home: true
        home: "{{ app_home }}"
        groups: []
        state: present

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - git
          - python3
          - python3-pip
          - python3-venv
        state: present
        update_cache: true

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Create application config directory
      ansible.builtin.file:
        path: "{{ app_home }}/.config"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0700"

    - name: Clone training-project repository
      ansible.builtin.git:
        repo: "{{ app_repo }}"
        dest: "{{ app_dir }}"
        version: main
      become_user: "{{ app_user }}"

    - name: Create application environment file
      ansible.builtin.copy:
        content: "PORT=5000\n"
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"

    - name: Install Python dependencies
      ansible.builtin.pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"
        virtualenv_python: python3
      become_user: "{{ app_user }}"
